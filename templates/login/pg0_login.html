
<h1>Login</h1>

<form method="POST">

    <label>Usuário:</label>
    <input type="text" name="usuario">
    <title>Login - Sistema Loja</title>
    <link  rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">

    <br><br>

    <label>Senha:</label>
    <input type="password" name="senha">

    <br><br>

    <button type="submit" name="acao" value="entrar">
        Entrar
    </button>

    <button type="submit" name="acao" value="sair">
        Sair
    </button>

</form>

{% if erro %}
    <p>{{ erro }}</p>
{% endif %}
